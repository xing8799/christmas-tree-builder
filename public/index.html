<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圣诞树配饰合成器</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
:root{
  --bg:#080c0a;--fg:#f0ece4;--muted:#6b7c6f;--accent:#c41e3a;
  --gold:#d4a843;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);
  --green-deep:#0d2818;--green:#1a5c2a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--fg);height:100vh;overflow:hidden;display:flex;flex-direction:column}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:9px}

/* 顶部栏 */
header{height:56px;background:linear-gradient(90deg,var(--green-deep),rgba(13,40,24,0.95));border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;z-index:100}
.logo{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;color:var(--gold);letter-spacing:1px;white-space:nowrap}
.logo i{color:var(--accent);margin-right:6px;font-size:18px}
.header-controls{display:flex;align-items:center;gap:12px;margin-left:auto;flex-wrap:wrap}
.size-toggle{display:flex;background:rgba(0,0,0,0.3);border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.size-btn{padding:6px 16px;font-size:13px;color:var(--muted);cursor:pointer;border:none;background:transparent;font-family:inherit;transition:all .2s}
.size-btn.active{background:var(--accent);color:#fff}
.tree-select{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(0,0,0,0.3);color:var(--fg);font-size:13px;font-family:inherit;cursor:pointer;max-width:160px}
.tree-select option{background:#111;color:#fff}
.btn{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--fg);font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all .2s;white-space:nowrap}
.btn:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.15)}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-accent:hover{background:#a8182f}
.btn-gold{background:var(--gold);border-color:var(--gold);color:#0a0f0d;font-weight:500}
.btn-gold:hover{background:#c09835}
.btn-sm{padding:5px 10px;font-size:12px}

/* 主体布局 */
main{flex:1;display:flex;overflow:hidden;position:relative}

/* 左侧配饰面板 */
.panel-left{width:220px;background:var(--green-deep);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.panel-title{padding:14px 16px 10px;font-size:13px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:2px;border-bottom:1px solid var(--border)}
.cat-tabs{display:flex;flex-wrap:wrap;gap:4px;padding:10px 12px;border-bottom:1px solid var(--border)}
.cat-tab{padding:4px 10px;border-radius:20px;font-size:11px;color:var(--muted);cursor:pointer;border:1px solid transparent;transition:all .2s;background:transparent;font-family:inherit}
.cat-tab:hover{color:var(--fg);border-color:var(--border)}
.cat-tab.active{color:var(--gold);border-color:var(--gold);background:rgba(212,168,67,0.08)}
.orn-grid{flex:1;overflow-y:auto;padding:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px;align-content:start}
.orn-card{aspect-ratio:1;border-radius:10px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:all .25s;position:relative;overflow:hidden}
.orn-card:hover{border-color:var(--gold);background:rgba(212,168,67,0.06);transform:scale(1.03)}
.orn-card img{max-width:70%;max-height:65%;object-fit:contain;pointer-events:none}
.orn-card span{font-size:10px;color:var(--muted);text-align:center;line-height:1.2;padding:0 4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.orn-card .add-icon{font-size:24px;color:var(--muted)}
.panel-bottom{padding:10px 12px;border-top:1px solid var(--border)}
.upload-hint{font-size:11px;color:var(--muted);text-align:center;line-height:1.5}

/* 中间画布区域 */
.canvas-area{flex:1;display:flex;align-items:center;justify-content:center;position:relative;background:radial-gradient(ellipse at 50% 40%,rgba(26,92,42,0.15),transparent 70%),radial-gradient(ellipse at 50% 100%,rgba(196,30,58,0.06),transparent 50%)}
#editor-canvas{border-radius:12px;box-shadow:0 0 60px rgba(0,0,0,0.5),0 0 120px rgba(26,92,42,0.1);cursor:default;max-width:95%;max-height:95%;object-fit:contain}
.canvas-empty{position:absolute;text-align:center;color:var(--muted);pointer-events:none}
.canvas-empty i{font-size:48px;color:var(--border);display:block;margin-bottom:12px}
.canvas-empty p{font-size:14px}

/* 右侧属性面板 */
.panel-right{width:240px;background:var(--green-deep);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.prop-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:12px;padding:20px}
.prop-empty i{font-size:36px;color:var(--border)}
.prop-empty p{font-size:13px;text-align:center;line-height:1.6}
.prop-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.prop-label{font-size:11px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.prop-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.prop-row:last-child{margin-bottom:0}
.prop-row label{font-size:12px;color:var(--fg);min-width:48px}
.prop-row input[type=range]{flex:1;-webkit-appearance:none;height:4px;background:var(--border);border-radius:2px;outline:none}
.prop-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid var(--bg)}
.prop-val{font-size:11px;color:var(--gold);min-width:36px;text-align:right}
.prop-btns{display:flex;gap:6px;flex-wrap:wrap}
.layer-btns{display:flex;gap:4px}
.layer-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--fg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s}
.layer-btn:hover{border-color:var(--gold);color:var(--gold)}
.prop-danger{color:var(--accent);border-color:var(--accent)}
.prop-danger:hover{background:var(--accent);color:#fff}

/* 雪花层 */
#snow-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}

/* Toast 通知 */
.toast-container{position:fixed;top:70px;right:20px;z-index:10000;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 18px;border-radius:8px;font-size:13px;color:#fff;animation:toastIn .3s ease;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.toast-success{background:var(--green)}
.toast-error{background:var(--accent)}
.toast-info{background:rgba(30,30,30,0.95);border:1px solid var(--border)}
@keyframes toastIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}

/* 模态框 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:5000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:linear-gradient(160deg,#111a14,#0a0f0d);border:1px solid var(--border);border-radius:16px;padding:28px;min-width:340px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.modal h3{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);margin-bottom:16px}
.modal input,.modal select{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:rgba(0,0,0,0.3);color:var(--fg);font-size:14px;font-family:inherit;margin-bottom:12px;outline:none;transition:border-color .2s}
.modal input:focus,.modal select:focus{border-color:var(--gold)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
.file-drop{border:2px dashed var(--border);border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:12px;color:var(--muted);font-size:13px}
.file-drop:hover,.file-drop.dragover{border-color:var(--gold);color:var(--gold);background:rgba(212,168,67,0.04)}
.file-drop i{font-size:28px;display:block;margin-bottom:8px}
.file-drop input{display:none}

/* 响应式 */
@media(max-width:900px){
  .panel-left{width:180px}
  .panel-right{width:200px}
}
@media(max-width:700px){
  main{flex-direction:column}
  .panel-left,.panel-right{width:100%;max-height:35vh;border:none;border-bottom:1px solid var(--border)}
  .orn-grid{grid-template-columns:repeat(4,1fr)}
  .canvas-area{min-height:300px}
}
</style>
</head>
<body>

<!-- 顶部导航 -->
<header>
  <div class="logo"><i class="fas fa-tree"></i>Tree Designer</div>
  <div class="header-controls">
    <div class="size-toggle">
      <button class="size-btn active" data-size="45cm">45cm</button>
      <button class="size-btn" data-size="60cm">60cm</button>
    </div>
    <select class="tree-select" id="treeSelect"><option value="">-- 选择树款 --</option></select>
    <button class="btn btn-gold" id="btnExport"><i class="fas fa-download"></i>导出图片</button>
    <button class="btn" id="btnClearAll"><i class="fas fa-trash-alt"></i>清空</button>
    <a href="/admin.html" class="btn" style="text-decoration:none"><i class="fas fa-cog"></i>后台</a>
  </div>
</header>

<!-- 主体 -->
<main>
  <!-- 左侧配饰面板 -->
  <aside class="panel-left">
    <div class="panel-title"><i class="fas fa-star" style="margin-right:6px"></i>配饰库</div>

      <button class="btn btn-sm" style="width:100%;justify-content:center" id="btnLocalUpload">
        <i class="fas fa-plus"></i>本地上传配饰
      </button>
      <p class="upload-hint" style="margin-top:8px">仅支持 PNG 透明图片<br>后台可上传到素材库</p>

  <!-- 中间画布 -->
  <section class="canvas-area">
    <canvas id="editor-canvas" width="600" height="800"></canvas>
    <div class="canvas-empty" id="canvasEmpty">

      <p>请在顶部选择一款圣诞树<br>然后从左侧配饰库添加装饰</p>

  <!-- 右侧属性面板 -->
  <aside class="panel-right">
    <div class="prop-empty" id="propEmpty">

      <p>选中画布上的配饰<br>即可调整属性</p>
    </div>

        <div class="prop-label">大小</div>

          <span class="prop-val" id="propScaleVal">100%</span>

      <div class="prop-section">

        <div class="prop-btns">

          <button class="btn btn-sm" id="btnFlipV"><i class="fas fa-arrows-up-down"></i>垂直翻转</button>

        <div class="prop-label">图层</div>

          <button class="layer-btn" id="btnLayerDown" title="下移"><i class="fas fa-angle-down"></i></button>
          <button class="layer-btn" id="btnLayerBottom" title="置底"><i class="fas fa-angles-down"></i></button>

<!-- 雪花 -->
<canvas id="snow-canvas"></canvas>

<!-- Toast容器 -->
<div class="toast-container" id="toastContainer"></div>

<!-- 本地上传模态框 -->
<div class="modal-overlay" id="modalLocalUpload">
  <div class="modal">
    <h3>本地上传配饰</h3>
    <div class="file-drop" id="localFileDrop">
      <i class="fas fa-cloud-arrow-up"></i>
      点击或拖拽PNG图片到这里
      <input type="file" id="localFileInput" accept=".png,image/png">
    </div>
    <input type="text" id="localOrnName" placeholder="配饰名称（可选）">
    <div class="modal-actions">
      <button class="btn" id="btnCancelLocal">取消</button>
      <button class="btn btn-accent" id="btnConfirmLocal">添加到画布</button>
    </div>
  </div>
</div>

<script>
/* ===========================
   配置与工具函数
   =========================== */
const CANVAS_W = 600, CANVAS_H = 800;
const HANDLE_SIZE = 7;
const ROTATE_HANDLE_DIST = 28;
const MIN_ITEM_SIZE = 15;

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 2500);
}

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

/* ===========================
   API 通信
   =========================== */
async function apiGet(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error(r.statusText);
    return await r.json();
  } catch (e) {
    console.warn('API请求失败:', url, e);
    return null;
  }
}

async function apiPost(url, formData) {
  try {
    const r = await fetch(url, { method: 'POST', body: formData });
    if (!r.ok) { const d = await r.json().catch(() => ({})); throw new Error(d.error || r.statusText); }
    return await r.json();
  } catch (e) {
    toast('请求失败: ' + e.message, 'error');
    return null;
  }
}

async function apiDelete(url) {
  try {
    const r = await fetch(url, { method: 'DELETE' });
    return r.ok;
  } catch (e) { return false; }
}

/* ===========================
   Canvas 编辑器核心
   =========================== */
class TreeEditor {
  constructor(canvasEl) {
    this.canvas = canvasEl;
    this.ctx = canvasEl.getContext('2d');
    this.dpr = window.devicePixelRatio || 1;
    this.displayW = CANVAS_W;
    this.displayH = CANVAS_H;
    this.canvas.width = CANVAS_W * this.dpr;
    this.canvas.height = CANVAS_H * this.dpr;
    this.canvas.style.width = CANVAS_W + 'px';
    this.canvas.style.height = CANVAS_H + 'px';
    this.ctx.scale(this.dpr, this.dpr);

    this.items = [];        // 画布上的配饰列表
    this.selected = null;   // 选中的配饰
    this.treeImage = null;  // 当前树图片
    this.treeDrawRect = null;

    // 交互状态
    this.mode = null;       // 'move' | 'resize' | 'rotate'
    this.dragStart = null;
    this.dragItemStart = null;
    this.activeHandle = null;

    this._bindEvents();
    this.render();
  }

  /* 坐标：屏幕 -> Canvas逻辑坐标 */
  _getPos(e) {
    const rect = this.canvas.getBoundingClientRect();
    return {
      x: (e.clientX - rect.left) * (this.displayW / rect.width),
      y: (e.clientY - rect.top) * (this.displayH / rect.height)
    };
  }

  /* 设置树图片 */
  setTree(img) {
    this.treeImage = img;
    // 计算树的绘制区域（居中，留边距）
    if (img) {
      const margin = 40;
      const scaleX = (this.displayW - margin * 2) / img.naturalWidth;
      const scaleY = (this.displayH - margin * 2) / img.naturalHeight;
      const scale = Math.min(scaleX, scaleY);
      const w = img.naturalWidth * scale;
      const h = img.naturalHeight * scale;
      this.treeDrawRect = { x: (this.displayW - w) / 2, y: (this.displayH - h) / 2, w, h };
    } else {
      this.treeDrawRect = null;
    }
    document.getElementById('canvasEmpty').style.display = img ? 'none' : 'flex';
    this.render();
  }

  /* 根据尺寸模式调整树大小 */
  setTreeSize(size) {
    if (!this.treeImage || !this.treeDrawRect) return;
    const img = this.treeImage;
    const margin = 40;
    const baseScale = Math.min((this.displayW - margin * 2) / img.naturalWidth, (this.displayH - margin * 2) / img.naturalHeight);
    const factor = size === '60cm' ? 1.15 : 1.0;
    const scale = baseScale * factor;
    const w = img.naturalWidth * scale;
    const h = img.naturalHeight * scale;
    this.treeDrawRect = { x: (this.displayW - w) / 2, y: (this.displayH - h) / 2, w, h };
    this.render();
  }

  /* 添加配饰到画布 */
  addItem(imageSrc, name) {
    return new Promise((resolve) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        const maxDim = 80;
        let w = img.naturalWidth, h = img.naturalHeight;
        if (w > maxDim || h > maxDim) {
          const r = Math.min(maxDim / w, maxDim / h);
          w *= r; h *= r;
        }
        const item = {
          id: Date.now() + '_' + Math.random().toString(36).slice(2, 6),
          name: name || '配饰',
          imageSrc, image: img,
          x: this.displayW / 2,
          y: this.displayH / 2,
          width: w, height: h,
          baseWidth: w, baseHeight: h,
          rotation: 0,
          flipX: false, flipY: false
        };
        this.items.push(item);
        this.selected = item;
        this.render();
        if (typeof onSelectionChange === 'function') onSelectionChange(item);
        resolve(item);
      };
      img.onerror = () => { toast('图片加载失败', 'error'); resolve(null); };
      img.src = imageSrc;
    });
  }

  /* 删除选中 */
  removeSelected() {
    if (!this.selected) return;
    this.items = this.items.filter(i => i !== this.selected);
    this.selected = null;
    this.render();
    if (typeof onSelectionChange === 'function') onSelectionChange(null);
  }

  /* 复制选中 */
  duplicateSelected() {
    if (!this.selected) return;
    const s = this.selected;
    const item = {
      ...s,
      id: Date.now() + '_' + Math.random().toString(36).slice(2, 6),
      x: s.x + 20, y: s.y + 20,
      baseWidth: s.baseWidth, baseHeight: s.baseHeight
    };
    this.items.push(item);
    this.selected = item;
    this.render();
    if (typeof onSelectionChange === 'function') onSelectionChange(item);
  }

  /* 图层操作 */
  moveLayer(dir) {
    if (!this.selected) return;
    const idx = this.items.indexOf(this.selected);
    if (dir === 'top') { this.items.splice(idx, 1); this.items.push(this.selected); }
    else if (dir === 'bottom') { this.items.splice(idx, 1); this.items.unshift(this.selected); }
    else if (dir === 'up' && idx < this.items.length - 1) { [this.items[idx], this.items[idx+1]] = [this.items[idx+1], this.items[idx]]; }
    else if (dir === 'down' && idx > 0) { [this.items[idx], this.items[idx-1]] = [this.items[idx-1], this.items[idx]]; }
    this.render();
  }

  /* 清空所有配饰 */
  clearAll() {
    this.items = [];
    this.selected = null;
    this.render();
    if (typeof onSelectionChange === 'function') onSelectionChange(null);
  }

  /* ===== 碰撞检测 ===== */
  _hitItem(px, py, item) {
    const dx = px - item.x, dy = py - item.y;
    const a = -item.rotation * Math.PI / 180;
    const lx = dx * Math.cos(a) - dy * Math.sin(a);
    const ly = dx * Math.sin(a) + dy * Math.cos(a);
    return Math.abs(lx) <= item.width / 2 + 4 && Math.abs(ly) <= item.height / 2 + 4;
  }

  _getHandles(item) {
    const hw = item.width / 2, hh = item.height / 2;
    const cos = Math.cos(item.rotation * Math.PI / 180);
    const sin = Math.sin(item.rotation * Math.PI / 180);
    const rot = (lx, ly) => ({ x: item.x + lx * cos - ly * sin, y: item.y + lx * sin + ly * cos });
    return [
      { ...rot(-hw, -hh), type: 'tl' }, { ...rot(hw, -hh), type: 'tr' },
      { ...rot(-hw, hh), type: 'bl' },  { ...rot(hw, hh), type: 'br' },
      { ...rot(0, -hh - ROTATE_HANDLE_DIST), type: 'rotate' }
    ];
  }

  _hitHandle(px, py, item) {
    if (!item) return null;
    for (const h of this._getHandles(item)) {
      if (Math.hypot(px - h.x, py - h.y) < HANDLE_SIZE + 4) return h.type;
    }
    return null;
  }

  /* ===== 绘制 ===== */
  render() {
    const ctx = this.ctx;
    const W = this.displayW, H = this.displayH;
    ctx.clearRect(0, 0, W, H);

    // 棋盘格背景（表示透明区域）
    const gridSize = 16;
    for (let y = 0; y < H; y += gridSize) {
      for (let x = 0; x < W; x += gridSize) {
        ctx.fillStyle = ((x / gridSize + y / gridSize) % 2 === 0) ? '#1a1f1c' : '#161b18';
        ctx.fillRect(x, y, gridSize, gridSize);
      }
    }

    // 绘制树
    if (this.treeImage && this.treeDrawRect) {
      const r = this.treeDrawRect;
      ctx.drawImage(this.treeImage, r.x, r.y, r.w, r.h);
    }

    // 绘制配饰
    for (const item of this.items) {
      this._drawItem(ctx, item);
    }

    // 绘制选中框和手柄
    if (this.selected) {
      this._drawSelection(ctx, this.selected);
    }
  }

  _drawItem(ctx, item) {
    ctx.save();
    ctx.translate(item.x, item.y);
    ctx.rotate(item.rotation * Math.PI / 180);
    ctx.scale(item.flipX ? -1 : 1, item.flipY ? -1 : 1);
    ctx.drawImage(item.image, -item.width / 2, -item.height / 2, item.width, item.height);
    ctx.restore();
  }

  _drawSelection(ctx, item) {
    ctx.save();
    ctx.translate(item.x, item.y);
    ctx.rotate(item.rotation * Math.PI / 180);

    const hw = item.width / 2, hh = item.height / 2, pad = 5;

    // 虚线边框
    ctx.strokeStyle = '#d4a843';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 3]);
    ctx.strokeRect(-hw - pad, -hh - pad, item.width + pad * 2, item.height + pad * 2);
    ctx.setLineDash([]);

    // 四角手柄
    ctx.fillStyle = '#d4a843';
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    for (const [cx, cy] of [[-hw, -hh], [hw, -hh], [-hw, hh], [hw, hh]]) {
      ctx.beginPath();
      ctx.rect(cx - HANDLE_SIZE, cy - HANDLE_SIZE, HANDLE_SIZE * 2, HANDLE_SIZE * 2);
      ctx.fill();
      ctx.stroke();
    }

    // 旋转手柄连接线
    ctx.beginPath();
    ctx.moveTo(0, -hh - pad);
    ctx.lineTo(0, -hh - pad - ROTATE_HANDLE_DIST);
    ctx.strokeStyle = '#d4a843';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // 旋转手柄圆
    ctx.beginPath();
    ctx.arc(0, -hh - pad - ROTATE_HANDLE_DIST, 7, 0, Math.PI * 2);
    ctx.fillStyle = '#c41e3a';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // 旋转图标
    ctx.fillStyle = '#fff';
    ctx.font = '8px FontAwesome';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('\uf2f1', 0, -hh - pad - ROTATE_HANDLE_DIST);

    ctx.restore();
  }

  /* ===== 鼠标/触摸事件 ===== */
  _bindEvents() {
    const c = this.canvas;
    c.addEventListener('mousedown', e => this._onDown(e));
    c.addEventListener('mousemove', e => this._onMove(e));
    c.addEventListener('mouseup', e => this._onUp(e));
    c.addEventListener('mouseleave', e => this._onUp(e));
    c.addEventListener('touchstart', e => { e.preventDefault(); this._onDown(e.touches[0]); }, { passive: false });
    c.addEventListener('touchmove', e => { e.preventDefault(); this._onMove(e.touches[0]); }, { passive: false });
    c.addEventListener('touchend', e => { e.preventDefault(); this._onUp(e); }, { passive: false });
  }

  _onDown(e) {
    const pos = this._getPos(e);

    // 检查选中项的手柄
    if (this.selected) {
      const ht = this._hitHandle(pos.x, pos.y, this.selected);
      if (ht === 'rotate') {
        this.mode = 'rotate';
        this.dragStart = pos;
        this.dragItemStart = { rotation: this.selected.rotation };
        return;
      }
      if (ht) {
        this.mode = 'resize';
        this.dragStart = pos;
        this.activeHandle = ht;
        this.dragItemStart = { width: this.selected.width, height: this.selected.height };
        return;
      }
    }

    // 检查是否点击了某个配饰（从顶层到底层）
    for (let i = this.items.length - 1; i >= 0; i--) {
      if (this._hitItem(pos.x, pos.y, this.items[i])) {
        this.selected = this.items[i];
        this.mode = 'move';
        this.dragStart = pos;
        this.dragItemStart = { x: this.items[i].x, y: this.items[i].y };
        if (typeof onSelectionChange === 'function') onSelectionChange(this.items[i]);
        this.render();
        return;
      }
    }

    // 空白处取消选中
    this.selected = null;
    this.mode = null;
    if (typeof onSelectionChange === 'function') onSelectionChange(null);
    this.render();
  }

  _onMove(e) {
    const pos = this._getPos(e);

    if (!this.mode || !this.selected) {
      // 更新鼠标样式
      if (this.selected) {
        const ht = this._hitHandle(pos.x, pos.y, this.selected);
        if (ht === 'rotate') { this.canvas.style.cursor = 'grab'; return; }
        if (ht) { this.canvas.style.cursor = 'nwse-resize'; return; }
      }
      let hovered = false;
      for (let i = this.items.length - 1; i >= 0; i--) {
        if (this._hitItem(pos.x, pos.y, this.items[i])) { hovered = true; break; }
      }
      this.canvas.style.cursor = hovered ? 'move' : 'default';
      return;
    }

    const s = this.selected;

    if (this.mode === 'move') {
      s.x = clamp(this.dragItemStart.x + (pos.x - this.dragStart.x), 0, this.displayW);
      s.y = clamp(this.dragItemStart.y + (pos.y - this.dragStart.y), 0, this.displayH);
    }
    else if (this.mode === 'rotate') {
      const angle = Math.atan2(pos.y - s.y, pos.x - s.x) * 180 / Math.PI + 90;
      s.rotation = Math.round(angle);
      if (s.rotation > 180) s.rotation -= 360;
      if (s.rotation < -180) s.rotation += 360;
    }
    else if (this.mode === 'resize') {
      const startDist = Math.max(1, Math.hypot(this.dragStart.x - s.x, this.dragStart.y - s.y));
      const curDist = Math.hypot(pos.x - s.x, pos.y - s.y);
      const ratio = curDist / startDist;
      const newW = clamp(this.dragItemStart.width * ratio, MIN_ITEM_SIZE, 600);
      const newH = clamp(this.dragItemStart.height * ratio, MIN_ITEM_SIZE, 600);
      s.width = newW;
      s.height = newH;
    }

    if (typeof onSelectionChange === 'function') onSelectionChange(s);
    this.render();
  }

  _onUp(e) {
    this.mode = null;
    this.dragStart = null;
    this.dragItemStart = null;
    this.activeHandle = null;
  }

  /* ===== 导出 ===== */
  exportImage() {
    const prev = this.selected;
    this.selected = null;
    this.render();

    // 创建干净的导出Canvas（不带棋盘格）
    const expCanvas = document.createElement('canvas');
    expCanvas.width = this.displayW * 2;
    expCanvas.height = this.displayH * 2;
    const ectx = expCanvas.getContext('2d');
    ectx.scale(2, 2);

    if (this.treeImage && this.treeDrawRect) {
      const r = this.treeDrawRect;
      ectx.drawImage(this.treeImage, r.x, r.y, r.w, r.h);
    }
    for (const item of this.items) {
      ectx.save();
      ectx.translate(item.x, item.y);
      ectx.rotate(item.rotation * Math.PI / 180);
      ectx.scale(item.flipX ? -1 : 1, item.flipY ? -1 : 1);
      ectx.drawImage(item.image, -item.width / 2, -item.height / 2, item.width, item.height);
      ectx.restore();
    }

    const link = document.createElement('a');
    link.download = 'christmas-tree-' + Date.now() + '.png';
    link.href = expCanvas.toDataURL('image/png');
    link.click();

    this.selected = prev;
    this.render();
    toast('图片已导出', 'success');
  }
}

/* ===========================
   选中回调（全局）
   =========================== */
function onSelectionChange(item) {
  const empty = document.getElementById('propEmpty');
  const content = document.getElementById('propContent');
  if (!item) {
    empty.style.display = 'flex';
    content.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  content.style.display = 'block';

  document.getElementById('propName').textContent = item.name;
  const scalePct = Math.round((item.width / item.baseWidth) * 100);
  document.getElementById('propScale').value = scalePct;
  document.getElementById('propScaleVal').textContent = scalePct + '%';
  document.getElementById('propRotate').value = item.rotation;
  document.getElementById('propRotateVal').textContent = item.rotation + '°';
}

/* ===========================
   UI 控制器
   =========================== */
let editor;
let currentSize = '45cm';
let allTrees = [];
let allOrnaments = [];
let allCategories = [];
let activeCategory = '全部';

async function initApp() {
  editor = new TreeEditor(document.getElementById('editor-canvas'));

  // 加载数据
  await loadCategories();
  await loadTrees();
  await loadOrnaments();

  // 绑定事件
  bindEvents();

  // 启动雪花
  initSnow();
}

/* 加载分类 */
async function loadCategories() {
  const data = await apiGet('/api/categories');
  if (data && Array.isArray(data)) {
    allCategories = data;
    renderCatTabs();
  }
}

function renderCatTabs() {
  const container = document.getElementById('catTabs');
  container.innerHTML = '';
  const tabs = ['全部', ...allCategories];
  tabs.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-tab' + (cat === activeCategory ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => { activeCategory = cat; renderCatTabs(); renderOrnGrid(); };
    container.appendChild(btn);
  });
}

/* 加载树列表 */
async function loadTrees() {
  const data = await apiGet('/api/trees');
  if (data && Array.isArray(data)) {
    allTrees = data;
    renderTreeSelect();
  }
}

function renderTreeSelect() {
  const sel = document.getElementById('treeSelect');
  const prev = sel.value;
  sel.innerHTML = '<option value="">-- 选择树款 --</option>';
  allTrees.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = `${t.name} (${t.size})`;
    sel.appendChild(opt);
  });
  if (prev && allTrees.find(t => t.id === prev)) {
    sel.value = prev;
  }
}

/* 加载配饰列表 */
async function loadOrnaments() {
  const data = await apiGet('/api/ornaments');
  if (data && Array.isArray(data)) {
    allOrnaments = data;
    renderOrnGrid();
  }
}

function renderOrnGrid() {
  const grid = document.getElementById('ornGrid');
  grid.innerHTML = '';

  const filtered = activeCategory === '全部' ? allOrnaments : allOrnaments.filter(o => o.category === activeCategory);

  filtered.forEach(orn => {
    const card = document.createElement('div');
    card.className = 'orn-card';
    card.title = orn.name;
    card.innerHTML = `<img src="${orn.imageUrl}" alt="${orn.name}" crossorigin="anonymous"><span>${orn.name}</span>`;
    card.onclick = () => {
      editor.addItem(orn.imageUrl, orn.name);
      toast(`已添加: ${orn.name}`, 'success');
    };
    grid.appendChild(card);
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--muted);font-size:13px;padding:30px 0">暂无配饰<br>请在后台上传</div>';
  }
}

/* 绑定所有事件 */
function bindEvents() {
  // 尺寸切换
  document.querySelectorAll('.size-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSize = btn.dataset.size;
      editor.setTreeSize(currentSize);
    };
  });

  // 树选择
  document.getElementById('treeSelect').onchange = async function() {
    const tree = allTrees.find(t => t.id === this.value);
    if (tree) {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        editor.setTree(img);
        editor.setTreeSize(currentSize);
        toast(`已加载: ${tree.name}`, 'success');
      };
      img.onerror = () => toast('树图片加载失败', 'error');
      img.src = tree.imageUrl;
    } else {
      editor.setTree(null);
    }
  };

  // 导出
  document.getElementById('btnExport').onclick = () => editor.exportImage();

  // 清空
  document.getElementById('btnClearAll').onclick = () => {
    if (editor.items.length === 0) return;
    editor.clearAll();
    toast('已清空所有配饰', 'info');
  };

  // 属性面板 - 缩放
  document.getElementById('propScale').oninput = function() {
    if (!editor.selected) return;
    const pct = parseInt(this.value);
    editor.selected.width = editor.selected.baseWidth * pct / 100;
    editor.selected.height = editor.selected.baseHeight * pct / 100;
    document.getElementById('propScaleVal').textContent = pct + '%';
    editor.render();
  };

  // 属性面板 - 旋转
  document.getElementById('propRotate').oninput = function() {
    if (!editor.selected) return;
    editor.selected.rotation = parseInt(this.value);
    document.getElementById('propRotateVal').textContent = this.value + '°';
    editor.render();
  };

  // 翻转
  document.getElementById('btnFlipH').onclick = () => {
    if (!editor.selected) return;
    editor.selected.flipX = !editor.selected.flipX;
    editor.render();
  };
  document.getElementById('btnFlipV').onclick = () => {
    if (!editor.selected) return;
    editor.selected.flipY = !editor.selected.flipY;
    editor.render();
  };

  // 图层
  document.getElementById('btnLayerTop').onclick = () => editor.moveLayer('top');
  document.getElementById('btnLayerUp').onclick = () => editor.moveLayer('up');
  document.getElementById('btnLayerDown').onclick = () => editor.moveLayer('down');
  document.getElementById('btnLayerBottom').onclick = () => editor.moveLayer('bottom');

  // 复制/删除
  document.getElementById('btnCopy').onclick = () => editor.duplicateSelected();
  document.getElementById('btnDelete').onclick = () => {
    editor.removeSelected();
    toast('已删除', 'info');
  };

  // 本地上传模态框
  const modal = document.getElementById('modalLocalUpload');
  const fileDrop = document.getElementById('localFileDrop');
  const fileInput = document.getElementById('localFileInput');
  let pendingLocalFile = null;

  document.getElementById('btnLocalUpload').onclick = () => modal.classList.add('show');
  document.getElementById('btnCancelLocal').onclick = () => { modal.classList.remove('show'); pendingLocalFile = null; };

  fileDrop.onclick = () => fileInput.click();
  fileDrop.ondragover = e => { e.preventDefault(); fileDrop.classList.add('dragover'); };
  fileDrop.ondragleave = () => fileDrop.classList.remove('dragover');
  fileDrop.ondrop = e => {
    e.preventDefault(); fileDrop.classList.remove('dragover');
    if (e.dataTransfer.files[0]) { pendingLocalFile = e.dataTransfer.files[0]; fileDrop.innerHTML = `<i class="fas fa-check-circle" style="color:var(--green)"></i>${pendingLocalFile.name}`; }
  };
  fileInput.onchange = () => {
    if (fileInput.files[0]) { pendingLocalFile = fileInput.files[0]; fileDrop.innerHTML = `<i class="fas fa-check-circle" style="color:var(--green)"></i>${pendingLocalFile.name}`; }
  };

  document.getElementById('btnConfirmLocal').onclick = () => {
    if (!pendingLocalFile) { toast('请先选择图片', 'error'); return; }
    const reader = new FileReader();
    reader.onload = () => {
      const name = document.getElementById('localOrnName').value || pendingLocalFile.name.replace('.png', '');
      editor.addItem(reader.result, name);
      modal.classList.remove('show');
      pendingLocalFile = null;
      fileDrop.innerHTML = '<i class="fas fa-cloud-arrow-up"></i>点击或拖拽PNG/JPG图片到这里<input type="file" id="localFileInput" accept=".png,.jpg,.jpeg,image/png,image/jpeg">';
      document.getElementById('localOrnName').value = '';
      // 重新绑定fileInput事件（因为innerHTML替换了）
      const newInput = fileDrop.querySelector('input');
      newInput.onchange = () => {
        if (newInput.files[0]) { pendingLocalFile = newInput.files[0]; fileDrop.innerHTML = `<i class="fas fa-check-circle" style="color:var(--green)"></i>${pendingLocalFile.name}`; }
      };
      toast('已添加到画布', 'success');
    };
    reader.readAsDataURL(pendingLocalFile);
  };

  // 键盘快捷键
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'Delete' || e.key === 'Backspace') { editor.removeSelected(); e.preventDefault(); }
    if (e.key === 'Escape') { editor.selected = null; onSelectionChange(null); editor.render(); }
    if ((e.ctrlKey || e.metaKey) && e.key === 'd') { e.preventDefault(); editor.duplicateSelected(); }
  });
}

/* ===========================
   雪花动画
   =========================== */
function initSnow() {
  const c = document.getElementById('snow-canvas');
  const ctx = c.getContext('2d');
  let W, H;
  const flakes = [];
  const MAX = 60;

  function resize() {
    W = c.width = window.innerWidth;
    H = c.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < MAX; i++) {
    flakes.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 3 + 1,
      vx: (Math.random() - 0.5) * 0.5,
      vy: Math.random() * 1 + 0.3,
      opacity: Math.random() * 0.5 + 0.2
    });
  }

  // 检查用户是否偏好减少动画
  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (prefersReduced) return;

  function frame() {
    ctx.clearRect(0, 0, W, H);
    for (const f of flakes) {
      f.x += f.vx;
      f.y += f.vy;
      if (f.y > H + 10) { f.y = -10; f.x = Math.random() * W; }
      if (f.x > W + 10) f.x = -10;
      if (f.x < -10) f.x = W + 10;
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${f.opacity})`;
      ctx.fill();
    }
    requestAnimationFrame(frame);
  }
  frame();
}

/* ===========================
   启动
   =========================== */
document.addEventListener('DOMContentLoaded', initApp);
</script>
